openapi: 3.1.0
info:
  title: The Shop Order Service
  description: Receives orders from The Shop React frontend, persists them to a Postgres database, and sends an email confirmation via Resend.
  version: 1.0.0
servers:
  - url: https://project-j6kwz.vercel.app
    description: Production
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the service health status. Does not require authentication.
      tags:
        - System
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /orders:
    post:
      operationId: createOrder
      summary: Create an order
      description: Validates the order payload, persists it to Postgres, and sends a confirmation email via Resend.
      tags:
        - Orders
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            example:
              items:
                - name: Classic T-Shirt
                  quantity: 2
                  price: 29.99
                - name: Canvas Tote Bag
                  quantity: 1
                  price: 14.99
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyItems:
                  summary: No items provided
                  value:
                    success: false
                    error: Order must contain at least one item
                invalidItem:
                  summary: Item validation failed
                  value:
                    success: false
                    error: Item name is required
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: Unauthorized
        '429':
          description: Rate limit exceeded (10 requests per minute)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: Too many requests, please try again later.
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: Failed to save order. Please try again.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
          example: ok
    OrderItem:
      type: object
      required:
        - name
        - quantity
        - price
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Classic T-Shirt
        quantity:
          type: integer
          minimum: 1
          maximum: 1000
          example: 2
        price:
          type: number
          exclusiveMinimum: 0
          maximum: 100000
          example: 29.99
    OrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/OrderItem'
    CreateOrderResponse:
      type: object
      required:
        - success
        - orderId
      properties:
        success:
          type: boolean
          example: true
        orderId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Invalid request
